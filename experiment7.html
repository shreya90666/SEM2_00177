<!DOCTYPE html>
<html>

<head>
    <title>Student Report Card</title>

    <style>

        body {
            background-color: #f2f2f7;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: purple;
        }

        .card {
            width: 280px;
            margin: 15px auto;
            padding: 15px;
            border: 2px solid #b388eb;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
        }

        .name {
            color: #5a2ea6;
        }

        .pass {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Student Report Card</h1>

        <div id="reportCard"></div>

    </div>

    <script>

        // Student Data

        let students = [
            {
                name: "Ananya Sharma",
                course: "B.Tech Computer Science",
                marks: 92
            },

            {
                name: "Rohan Mehta",
                course: "B.Tech Data Science",
                marks: 78
            },

            {
                name: "Priya Patel",
                course: "B.Tech IT",
                marks: 85
            },

            {
                name: "Arjun Singh",
                course: "B.Tech Electronics",
                marks: 45
            },

            {
                name: "Sneha Gupta",
                course: "B.Tech Computer Science",
                marks: 67
            }
        ];

        let output = "";

        // Loop for displaying cards

        students.forEach(function(student) {

            let status = "";
            let statusClass = "";

            if(student.marks >= 50) {
                status = "Pass";
                statusClass = "pass";
            }
            else {
                status = "Fail";
                statusClass = "fail";
            }

            output += `
            
            <div class="card">

                <h2 class="name">${student.name}</h2>

                <p><b>Course:</b> ${student.course}</p>

                <p><b>Marks:</b> ${student.marks} / 100</p>

                <p class="${statusClass}">
                    Status: ${status}
                </p>

            </div>
            
            `;
        });

        document.getElementById("reportCard").innerHTML = output;

    </script>

</body>

</html>
