<!DOCTYPE html>
<html>
<head>
    <title>Sum of Even Numbers</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            color: green;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Sum of Even Numbers</h2>

        <input type="number" id="num" placeholder="Enter a number">
        <br>

        <button onclick="calculateSum()">Calculate</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateSum() {
            let n = parseInt(document.getElementById("num").value);
            let sum = 0;

            for (let i = 1; i <= n; i++) {
                if (i % 2 === 0) {
                    sum += i;
                }
            }

            document.getElementById("result").innerHTML =
                "Sum = " + sum;
        }
    </script>

</body>
</html>
