<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Counter App</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      width: 500px;
      height: 500px;
      margin: 50px auto;
      border: 2px solid #444;
      text-align: center;
      background: white;
    }

    h1 {
      margin-top: 80px;
      color: blueviolet;
      font-size: 45px;
    }

    h2 {
      margin-top: 60px;
      font-size: 80px;
      color: green;
    }

    .buttons {
      margin-top: 60px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      color: white;
    }

    .increment {
      background-color: blueviolet;
    }

    .decrement {
      background-color: orangered;
    }

    .reset {
      background-color: gray;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Counter App</h1>

    <h2 id="count">8</h2>

    <div class="buttons">
      <button class="increment" onclick="increment()">
        + Increment
      </button>

      <button class="decrement" onclick="decrement()">
        - Decrement
      </button>

      <button class="reset" onclick="resetCounter()">
        ↺ Reset
      </button>
    </div>
  </div>

  <script>
    let count = 8;

    function updateDisplay() {
      document.getElementById("count").innerText = count;
    }

    function increment() {
      count++;
      updateDisplay();
    }

    function decrement() {
      count--;
      updateDisplay();
    }

    function resetCounter() {
      count = 0;
      updateDisplay();
    }
  </script>

</body>
</html>
